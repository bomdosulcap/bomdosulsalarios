<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bom do Sul — Sistema de Folha de Pagamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root {
  --teal: #13505C; --teal-dark: #0C3840; --teal-deeper: #082A30;
  --cream: #F5EEDC; --cream-light: #FBF8F1; --ink: #1C2B2E;
  --muted-teal: #5C7A80; --brick: #A8461F; --brick-light: #F3E1D6;
  --moss: #5F7A3D; --moss-light: #E8EEDC; --gold: #C89B3C; --gold-light: #F7EDD6;
  --border: #E1D9C4;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--ink);
  background: var(--cream-light);
  min-height: 100vh;
  width: 100%;
}
h1, h3 { font-family: 'Fraunces', Georgia, serif; margin: 0; }
.mono { font-family: 'IBM Plex Mono', monospace; }
.icn { display: inline-block; vertical-align: middle; flex-shrink: 0; }

.boot-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--teal-deeper); }
.boot-spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(245,238,220,0.25); border-top-color: var(--cream); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------------- LOGIN ---------------- */
.login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(circle at 15% 20%, rgba(200,155,60,0.12), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(95,122,61,0.14), transparent 45%),
    linear-gradient(160deg, var(--teal-deeper), var(--teal) 65%);
  padding: 24px;
}
.login-card {
  background: var(--cream-light);
  border-radius: 18px;
  width: 100%; max-width: 400px;
  padding: 40px 36px 32px;
  box-shadow: 0 30px 60px -20px rgba(8,42,48,0.5);
  border: 1px solid rgba(255,255,255,0.08);
}
.login-brand { text-align: center; margin-bottom: 28px; }
.login-logo { width: 96px; height: auto; margin-bottom: 8px; }
.login-subtitle { color: var(--muted-teal); font-size: 13.5px; margin: 4px 0 0; letter-spacing: 0.02em; }
.login-form { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 12.5px; font-weight: 600; color: var(--muted-teal); margin: 10px 0 2px; text-transform: uppercase; letter-spacing: 0.04em; display: block; }
.input-with-icon { position: relative; display: flex; align-items: center; color: var(--muted-teal); }
.input-with-icon .icn { position: absolute; left: 12px; pointer-events: none; }
.input-with-icon input {
  width: 100%; padding: 11px 40px 11px 38px; border-radius: 10px;
  border: 1.5px solid var(--border); font-size: 14.5px; background: #fff; color: var(--ink);
  font-family: 'Inter', sans-serif;
}
.input-with-icon input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(19,80,92,0.12); }
.icon-toggle { position: absolute; right: 8px; background: none; border: none; cursor: pointer; color: var(--muted-teal); padding: 6px; display: flex; border-radius: 6px; }
.icon-toggle:hover { background: var(--cream); color: var(--teal); }
.remember-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink); margin: 14px 0 6px; cursor: pointer; }
.remember-row input { accent-color: var(--teal); width: 15px; height: 15px; }
.login-error { display: flex; align-items: center; gap: 6px; color: var(--brick); background: var(--brick-light); padding: 8px 10px; border-radius: 8px; font-size: 13px; margin-top: 10px; }
.login-hint { text-align: center; font-size: 12px; color: var(--muted-teal); margin: 16px 0 0; }

/* ---------------- BUTTONS ---------------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
  transition: transform 0.08s ease, box-shadow 0.15s ease, background 0.15s ease;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.55; cursor: not-allowed; }
.btn-primary { background: var(--teal); color: var(--cream-light); }
.btn-primary:hover:not(:disabled) { background: var(--teal-dark); }
.btn-ghost { background: transparent; color: var(--muted-teal); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--cream); }
.btn-danger { background: var(--brick); color: #fff; }
.btn-danger:hover { background: #8a3717; }
.btn-moss { background: var(--moss); color: #fff; }
.btn-moss:hover { background: #4d652f; }
.btn-brick { background: var(--brick); color: #fff; }
.btn-brick:hover { background: #8a3717; }
.btn-block { width: 100%; margin-top: 16px; padding: 12px; font-size: 15px; }

/* ---------------- SHELL / SIDEBAR ---------------- */
.app-shell { display: flex; min-height: 100vh; }
.sidebar { width: 240px; flex-shrink: 0; background: var(--teal-deeper); color: var(--cream-light); display: flex; flex-direction: column; padding: 22px 16px; }
.sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 4px 6px 22px; border-bottom: 1px solid rgba(245,238,220,0.14); margin-bottom: 18px; }
.sidebar-logo { width: 40px; height: auto; }
.sidebar-company { display: flex; flex-direction: column; line-height: 1.3; overflow: hidden; }
.sidebar-company strong { font-family: 'Fraunces', serif; font-size: 16px; }
.sidebar-company span { font-size: 10.5px; color: rgba(245,238,220,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.sidebar-item {
  display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 9px;
  background: transparent; border: none; color: rgba(245,238,220,0.75); cursor: pointer;
  font-size: 13.8px; font-family: 'Inter', sans-serif; font-weight: 500; text-align: left;
  transition: background 0.15s ease, color 0.15s ease;
}
.sidebar-item:hover { background: rgba(245,238,220,0.08); color: var(--cream-light); }
.sidebar-item.active { background: var(--gold); color: var(--teal-deeper); font-weight: 600; }
.sidebar-logout {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px;
  background: transparent; border: 1px solid rgba(245,238,220,0.16); color: rgba(245,238,220,0.75);
  cursor: pointer; font-size: 13.5px; font-family: 'Inter', sans-serif; margin-top: 12px;
}
.sidebar-logout:hover { background: rgba(245,238,220,0.08); color: #fff; }
.sync-status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin-top: 10px; border-radius: 9px; font-size: 11.5px; background: rgba(245,238,220,0.06); color: rgba(245,238,220,0.7); }
.sync-status.cloud-ok { color: #a8d5ae; }
.sync-status.cloud-warn { color: var(--gold); }
.sync-status.cloud-off { color: rgba(245,238,220,0.45); }
.sync-status span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ---------------- STATUS BADGES ---------------- */
.status-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.status-on { background: var(--moss-light); color: var(--moss); }
.status-off { background: var(--brick-light); color: var(--brick); }

/* ---------------- RANKING PANELS ---------------- */
.rank-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.rank-row:last-child { border-bottom: none; }
.rank-pos { width: 26px; flex-shrink: 0; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted-teal); font-weight: 600; }
.rank-info { flex: 1; min-width: 0; }
.rank-info strong { display: block; font-size: 13px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rank-bar-track { height: 5px; border-radius: 999px; background: var(--cream); overflow: hidden; }
.rank-bar-fill { height: 100%; border-radius: 999px; }
.rank-value { font-size: 12.5px; font-weight: 600; color: var(--ink); white-space: nowrap; flex-shrink: 0; text-align: right; }
.rank-tag { display: block; font-size: 9.5px; font-weight: 600; text-transform: uppercase; color: var(--brick); margin-top: 2px; }

/* ---------------- SUPABASE INTEGRATION ---------------- */
.sb-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
.sb-sql-details { margin-top: 16px; font-size: 13px; }
.sb-sql-details summary { cursor: pointer; color: var(--teal); font-weight: 600; padding: 6px 0; }
.sb-sql-block { background: var(--teal-deeper); color: #d9ecec; padding: 16px; border-radius: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; line-height: 1.6; overflow-x: auto; white-space: pre; margin-top: 8px; }
.ping-result { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 13px; padding: 10px 12px; border-radius: 9px; background: var(--cream-light); }
.ping-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted-teal); flex-shrink: 0; }
.ping-ok .ping-dot { background: var(--moss); }
.ping-fail .ping-dot { background: var(--brick); }
.ping-pending .ping-dot { background: var(--gold); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

.app-main { flex: 1; padding: 32px 40px; overflow-x: hidden; min-width: 0; }

/* ---------------- VIEW HEADER ---------------- */
.view { max-width: 1180px; }
.view-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 26px; flex-wrap: wrap; }
.view-header h1 { font-size: 26px; color: var(--teal-deeper); }
.view-subtitle { color: var(--muted-teal); font-size: 13.5px; margin: 4px 0 0; }
.select-year, select {
  padding: 9px 30px 9px 12px; border-radius: 9px; border: 1.5px solid var(--border);
  background: #fff; font-family: 'Inter', sans-serif; font-size: 13.5px; color: var(--ink); cursor: pointer;
}

/* ---------------- CARDS / STATS ---------------- */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 22px; }
.stat-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 18px; display: flex; align-items: center; gap: 14px; }
.stat-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-value { display: block; font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--teal-deeper); line-height: 1.25; }
.stat-label { display: block; font-size: 12px; color: var(--muted-teal); margin-top: 2px; }

.panels-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }
.panel { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }
.panel h3 { font-size: 15px; color: var(--teal-deeper); margin-bottom: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.panel-span2 { grid-column: 1 / -1; }
.dash-block { margin-top: 16px; }
.chart-box { position: relative; height: 270px; }
@media (max-width: 900px) { .panels-grid { grid-template-columns: 1fr; } }

/* ---------------- TOOLBAR / TABLE ---------------- */
.toolbar { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.search-box { display: flex; align-items: center; gap: 8px; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; flex: 1; max-width: 340px; color: var(--muted-teal); }
.search-box input { border: none; outline: none; font-size: 13.5px; width: 100%; font-family: 'Inter', sans-serif; }
.toolbar-count { font-size: 12.5px; color: var(--muted-teal); }

.table-wrap { background: #fff; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.data-table th { text-align: left; padding: 12px 16px; background: var(--cream); color: var(--teal-deeper); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
.data-table td { padding: 13px 16px; border-top: 1px solid var(--border); vertical-align: middle; }
.data-table tbody tr:hover { background: var(--cream-light); }
.table-subtext { font-size: 11.5px; color: var(--muted-teal); margin-top: 2px; }
.empty-row { text-align: center; color: var(--muted-teal); padding: 30px !important; }
.empty-hint { color: var(--muted-teal); font-size: 13.5px; }
.row-actions { display: flex; gap: 6px; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--muted-teal); padding: 6px; border-radius: 7px; display: flex; }
.icon-btn:hover { background: var(--cream); color: var(--teal); }
.icon-btn-danger:hover { background: var(--brick-light); color: var(--brick); }

/* ---------------- MODAL ---------------- */
.modal-overlay { position: fixed; inset: 0; background: rgba(8,42,48,0.55); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
.modal-card { background: #fff; border-radius: 16px; width: 100%; max-width: 620px; max-height: 88vh; overflow-y: auto; box-shadow: 0 30px 60px -20px rgba(0,0,0,0.35); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #fff; z-index: 1; }
.modal-header h3 { font-size: 17px; color: var(--teal-deeper); }
.modal-body { padding: 22px; }

/* ---------------- FORMS ---------------- */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field.span-2 { grid-column: span 2; }
.form-field label { font-size: 12px; font-weight: 600; color: var(--muted-teal); text-transform: uppercase; letter-spacing: 0.03em; }
.form-field input, .form-field select {
  padding: 9px 12px; border-radius: 9px; border: 1.5px solid var(--border); font-size: 14px;
  font-family: 'Inter', sans-serif; color: var(--ink);
}
.form-field input:focus, .form-field select:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(19,80,92,0.1); }
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }

.filters-bar { display: flex; align-items: flex-end; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
.filters-bar .form-field { min-width: 160px; }
.filters-bar select, .filters-bar input { width: 100%; padding: 9px 12px; border-radius: 9px; border: 1.5px solid var(--border); font-size: 13.5px; font-family: 'Inter', sans-serif; }

/* ---------------- LANÇAMENTOS ---------------- */
.tipo-toggle { display: flex; gap: 8px; margin-bottom: 14px; padding: 0 22px; }
.lanc-tipo-btn { flex: 1; padding: 9px; border-radius: 9px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-weight: 600; font-size: 13.5px; color: var(--muted-teal); font-family: 'Inter', sans-serif; }
.lanc-tipo-btn.active { background: var(--teal); color: #fff; border-color: var(--teal); }
.chip-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; padding: 0 22px; }
.chip { padding: 6px 12px; border-radius: 999px; border: 1.5px solid var(--border); background: #fff; font-size: 12px; cursor: pointer; color: var(--ink); font-family: 'Inter', sans-serif; }
.chip:hover { border-color: var(--teal); }
.chip-active { background: var(--gold); border-color: var(--gold); color: var(--teal-deeper); font-weight: 600; }

.lanc-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
@media (max-width: 800px) { .lanc-columns { grid-template-columns: 1fr; } }
.lanc-col-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid; }
.lanc-col-title-moss { color: var(--moss); border-color: var(--moss); }
.lanc-col-title-brick { color: var(--brick); border-color: var(--brick); }
.lanc-item { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid var(--border); border-radius: 11px; padding: 12px 14px; margin-bottom: 8px; }
.lanc-item-right { display: flex; align-items: center; gap: 10px; }

/* ---------------- PAYSLIP ---------------- */
.payslip { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 26px 28px; }
.payslip-header { display: flex; align-items: center; gap: 14px; padding-bottom: 16px; border-bottom: 2px solid var(--teal-deeper); margin-bottom: 16px; }
.payslip-logo { width: 46px; height: auto; }
.payslip-header strong { font-family: 'Fraunces', serif; font-size: 16px; color: var(--teal-deeper); display: block; }
.payslip-meta { font-size: 11.5px; color: var(--muted-teal); margin-top: 2px; }
.payslip-competencia { margin-left: auto; text-align: right; }
.payslip-competencia span { display: block; font-size: 10.5px; letter-spacing: 0.05em; color: var(--muted-teal); text-transform: uppercase; }
.payslip-competencia strong { font-family: 'Fraunces', serif; font-size: 16px; color: var(--teal-deeper); }
.payslip-funcionario { display: flex; gap: 22px; flex-wrap: wrap; font-size: 12.5px; margin-bottom: 6px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
.payslip-funcionario span { display: block; color: var(--muted-teal); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.03em; }
.payslip-funcionario strong { font-weight: 600; }
.payslip-funcionario .grow { flex: 1; min-width: 180px; }
.payslip-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 12.5px; }
.payslip-table th { text-align: left; padding: 7px 8px; background: var(--cream); color: var(--teal-deeper); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.03em; }
.payslip-table td { padding: 7px 8px; border-top: 1px solid var(--border); }
.num-positive { color: var(--moss); font-weight: 600; }
.num-negative { color: var(--brick); font-weight: 600; }
.payslip-bases { display: flex; gap: 22px; flex-wrap: wrap; font-size: 12px; padding: 12px 0; border-top: 1px dashed var(--border); }
.payslip-bases span { display: block; color: var(--muted-teal); font-size: 10.5px; text-transform: uppercase; }
.payslip-totals { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; }
.payslip-totals > div { flex: 1; min-width: 150px; background: var(--cream-light); border-radius: 10px; padding: 12px 14px; }
.payslip-totals span { display: block; font-size: 10.5px; color: var(--muted-teal); text-transform: uppercase; letter-spacing: 0.03em; }
.payslip-totals strong { font-family: 'Fraunces', serif; font-size: 16px; }
.payslip-liquido { background: var(--teal-deeper) !important; }
.payslip-liquido span { color: rgba(245,238,220,0.7) !important; }
.payslip-liquido strong { color: var(--cream-light) !important; font-size: 19px !important; }
.payslip-signature { margin-top: 26px; font-size: 12px; color: var(--muted-teal); }
.signature-line { margin-top: 30px; padding-top: 6px; border-top: 1px solid var(--ink); max-width: 280px; text-align: center; }

/* ---------------- CONFIG TABLE ---------------- */
.config-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.config-table th { text-align: left; padding: 8px; color: var(--muted-teal); font-size: 11px; text-transform: uppercase; }
.config-table td { padding: 5px 8px 5px 0; }
.config-table input { width: 100%; padding: 7px 10px; border-radius: 8px; border: 1.5px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

.danger-zone { border-color: var(--brick-light); background: #fffaf7; }
.danger-zone h3 { color: var(--brick); }

/* ---------------- PRINT ---------------- */
@media print {
  .no-print, .sidebar { display: none !important; }
  .app-main { padding: 0 !important; }
  .payslip { border: none !important; box-shadow: none !important; }
}

@media (max-width: 760px) {
  .app-shell { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 12px 16px; overflow-x: auto; }
  .sidebar-brand { border-bottom: none; margin-bottom: 0; padding-bottom: 0; padding-right: 14px; border-right: 1px solid rgba(245,238,220,0.14); margin-right: 10px; }
  .sidebar-company { display: none; }
  .sidebar-nav { flex-direction: row; }
  .sidebar-item span { display: none; }
  .sidebar-logout { margin-top: 0; margin-left: auto; }
  .sidebar-logout span { display: none; }
  .app-main { padding: 20px 16px; }
  .form-grid { grid-template-columns: 1fr; }
  .form-field.span-2 { grid-column: span 1; }
  .tipo-toggle, .chip-row { padding: 0; }
}

</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================================================
   BOM DO SUL — SISTEMA DE FOLHA DE PAGAMENTO
   Vanilla JS, sem dependências de build. Dados persistidos via
   window.storage (privados, por usuário).

/* ---------------- HELPERS ---------------- */

const round2 = (v) => Math.round((Number(v) + Number.EPSILON) * 100) / 100;

const fmtBRL = (v) => (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

const fmtDate = (iso) => {
  if (!iso) return '—';
  const parts = iso.split('-');
  if (parts.length !== 3) return iso;
  const [y, m, d] = parts;
  return `${d}/${m}/${y}`;
};

const uid = () => `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function calcINSS(salarioBase, inssTable) {
  let total = 0;
  let faixaAnterior = 0;
  for (const faixa of inssTable) {
    if (salarioBase > faixaAnterior) {
      const tetoFaixa = Math.min(salarioBase, faixa.ate);
      const baseFaixa = tetoFaixa - faixaAnterior;
      total += baseFaixa * (faixa.aliquota / 100);
      faixaAnterior = faixa.ate;
    } else {
      break;
    }
  }
  return round2(total);
}

function calcIRRF(baseCalculo, irrfTable) {
  if (baseCalculo <= 0) return 0;
  for (const faixa of irrfTable) {
    if (baseCalculo <= faixa.ate) {
      const val = baseCalculo * (faixa.aliquota / 100) - faixa.deducao;
      return round2(Math.max(val, 0));
    }
  }
  return 0;
}

function computeFolha(funcionario, ano, mes, lancamentos, config) {
  const itens = lancamentos.filter((l) => l.funcionarioId === funcionario.id && l.ano === ano && l.mes === mes);
  const proventosLanc = itens.filter((i) => i.tipo === 'provento');
  const descontosLanc = itens.filter((i) => i.tipo === 'desconto');

  const salarioBaseItem = {
    id: 'base-' + funcionario.id,
    codigo: '005',
    descricao: 'Salário mensalista',
    referencia: '30,00',
    valor: round2(funcionario.salarioBase || 0),
  };
  const proventos = [salarioBaseItem, ...proventosLanc];
  const totalProventos = round2(proventos.reduce((s, i) => s + Number(i.valor || 0), 0));

  const baseINSS = totalProventos;
  const inssValor = calcINSS(baseINSS, config.inss);

  const baseFGTS = baseINSS;
  const fgtsValor = round2(baseFGTS * (config.fgtsRate / 100));

  const dependentesDeducao = round2((funcionario.dependentes || 0) * config.deducaoPorDependente);
  const baseIRRF = Math.max(0, round2(baseINSS - inssValor - dependentesDeducao));
  const irrfValor = calcIRRF(baseIRRF, config.irrf);

  const outrosDescontos = round2(descontosLanc.reduce((s, i) => s + Number(i.valor || 0), 0));
  const totalDescontos = round2(inssValor + irrfValor + outrosDescontos);
  const salarioLiquido = round2(totalProventos - totalDescontos);

  return {
    funcionario, ano, mes, proventos, descontosLanc,
    totalProventos, baseINSS, inssValor, baseFGTS, fgtsValor,
    baseIRRF, irrfValor, outrosDescontos, totalDescontos, salarioLiquido, dependentesDeducao,
  };
}

async function storageGet(key) {
  try {
    const res = await window.storage.get(key, false);
    return res ? JSON.parse(res.value) : null;
  } catch (e) {
    return null;
  }
}
async function storageSet(key, value) {
  try {
    await window.storage.set(key, JSON.stringify(value), false);
    return true;
  } catch (e) {
    console.error('storage set failed', key, e);
    return false;
  }
}

/* ---------------- SUPABASE (REST / PostgREST) ---------------- */

function supabaseBaseUrl(cfg) {
  let u = (cfg.url || '').trim().replace(/\/+$/, '');
  u = u.replace(/\/rest\/v1$/, '');
  return u;
}
function supabaseHeaders(cfg, extra) {
  return Object.assign({
    'apikey': cfg.anonKey,
    'Authorization': 'Bearer ' + cfg.anonKey,
    'Content-Type': 'application/json',
  }, extra || {});
}

// Testa a conectividade com o projeto Supabase (não exige tabelas criadas).
async function supabasePing(cfg) {
  const start = (window.performance || Date).now();
  try {
    if (!cfg.url || !cfg.anonKey) return { ok: false, ms: 0, message: 'URL ou chave não configuradas.' };
    const res = await fetch(supabaseBaseUrl(cfg) + '/rest/v1/', { method: 'GET', headers: supabaseHeaders(cfg) });
    const ms = Math.round((window.performance || Date).now() - start);
    if (res.ok || res.status === 404) return { ok: true, ms, message: `Conectado (HTTP ${res.status})` };
    if (res.status === 401 || res.status === 403) return { ok: false, ms, message: `Chave rejeitada (HTTP ${res.status})` };
    return { ok: false, ms, message: `Resposta inesperada (HTTP ${res.status})` };
  } catch (e) {
    const ms = Math.round((window.performance || Date).now() - start);
    return { ok: false, ms, message: 'Falha de rede / CORS / URL inválida' };
  }
}

async function supabaseSelect(cfg, table, query) {
  const url = supabaseBaseUrl(cfg) + '/rest/v1/' + table + (query || '?select=*');
  const res = await fetch(url, { headers: supabaseHeaders(cfg) });
  if (!res.ok) throw new Error('Supabase select ' + table + ' falhou: HTTP ' + res.status);
  return res.json();
}
async function supabaseUpsert(cfg, table, rows, onConflict) {
  const url = supabaseBaseUrl(cfg) + '/rest/v1/' + table + (onConflict ? '?on_conflict=' + onConflict : '');
  const res = await fetch(url, {
    method: 'POST',
    headers: supabaseHeaders(cfg, { 'Prefer': 'resolution=merge-duplicates,return=representation' }),
    body: JSON.stringify(rows),
  });
  if (!res.ok) throw new Error('Supabase upsert ' + table + ' falhou: HTTP ' + res.status);
  return res.json();
}
async function supabaseDeleteById(cfg, table, id) {
  const url = supabaseBaseUrl(cfg) + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id);
  const res = await fetch(url, { method: 'DELETE', headers: supabaseHeaders(cfg, { 'Prefer': 'return=minimal' }) });
  if (!res.ok) throw new Error('Supabase delete ' + table + ' falhou: HTTP ' + res.status);
}

// Envia (fire-and-forget, com log de erro) uma linha para o Supabase quando a
// sincronização em nuvem está ativa. Nunca bloqueia a interface local.
function cloudSyncUpsert(table, row, onConflict) {
  if (!state.supabase.enabled) return;
  supabaseUpsert(state.supabase, table, [row], onConflict).catch((e) => console.warn('cloud sync (upsert) falhou:', e.message));
}
function cloudSyncDelete(table, id) {
  if (!state.supabase.enabled) return;
  supabaseDeleteById(state.supabase, table, id).catch((e) => console.warn('cloud sync (delete) falhou:', e.message));
}

async function pullFromCloud() {
  const cfg = state.supabase;
  const [funcRows, lancRows, settingsRows] = await Promise.all([
    supabaseSelect(cfg, 'funcionarios'),
    supabaseSelect(cfg, 'lancamentos'),
    supabaseSelect(cfg, 'app_settings', '?select=*&id=eq.1'),
  ]);
  state.funcionarios = funcRows.map(rowToFunc);
  state.lancamentos = lancRows.map(rowToLanc);
  if (settingsRows && settingsRows[0]) {
    if (settingsRows[0].config) state.config = settingsRows[0].config;
    if (settingsRows[0].empresa) state.empresa = settingsRows[0].empresa;
  }
}

async function init() {
  const [cred, remembered, func, lanc, cfg, emp, sup] = await Promise.all([
    storageGet(STORAGE_KEYS.CRED),
    storageGet(STORAGE_KEYS.REMEMBER),
    storageGet(STORAGE_KEYS.FUNC),
    storageGet(STORAGE_KEYS.LANC),
    storageGet(STORAGE_KEYS.CONFIG),
    storageGet(STORAGE_KEYS.EMPRESA),
    storageGet(STORAGE_KEYS.SUPABASE),
  ]);
  if (cred) state.credentials = cred; else await storageSet(STORAGE_KEYS.CRED, DEFAULT_CREDENTIALS);
  if (remembered) state.rememberedLogin = remembered;
  if (func) state.funcionarios = func;
  if (lanc) state.lancamentos = lanc;
  if (cfg) state.config = cfg;
  if (emp) state.empresa = emp;
  if (sup) state.supabase = { ...DEFAULT_SUPABASE, ...sup };
  if (state.supabase.enabled) {
    try {
      await pullFromCloud();
    } catch (e) {
      console.warn('Não foi possível carregar dados do Supabase — usando cache local.', e.message);
    }
  }
  state.loading = false;
  renderApp();
}

      <main class="app-main">

}

  const el = document.getElementById('view-content');
  if (!el) return;
  destroyChart('chartLiquido'); destroyChart('chartPie'); destroyChart('chartLine'); destroyChart('chartHead'); destroyChart('chartStatus');
  if (state.view === 'dashboard') { el.innerHTML = dashboardHTML(); attachDashboardListeners(); mountDashboardCharts(); }

  else if (state.view === 'lancamentos') { el.innerHTML = lancamentosHTML(); attachLancamentosListeners(); }
  else if (state.view === 'folha') { el.innerHTML = folhaHTML(); attachFolhaListeners(); }

}

function attachLoginListeners() {
  const passInput = $('#login-pass');
  const toggleBtn = $('#toggle-pass');
  let showPass = false;
  toggleBtn.addEventListener('click', () => {
    showPass = !showPass;
    passInput.type = showPass ? 'text' : 'password';
    toggleBtn.innerHTML = showPass ? icon('eyeOff', 17) : icon('eye', 17);
  });

  $('#login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = $('#login-user').value.trim();
    const password = $('#login-pass').value;
    const remember = $('#login-remember').checked;
    const errorSlot = $('#login-error-slot');
    errorSlot.innerHTML = '';
    if (!username || !password) {
      errorSlot.innerHTML = `<div class="login-error">${icon('alert', 15)} Preencha usuário e senha.</div>`;
      return;
    }
    const submitBtn = $('#login-submit');
    submitBtn.disabled = true; submitBtn.textContent = 'Entrando...';
    const current = (await storageGet(STORAGE_KEYS.CRED)) || state.credentials;
    const ok = username === current.username && password === current.password;
    if (ok) {
      state.authed = true;
      if (remember) await storageSet(STORAGE_KEYS.REMEMBER, { username, password });
      else await storageSet(STORAGE_KEYS.REMEMBER, null);
      renderApp();
    } else {
      submitBtn.disabled = false; submitBtn.textContent = 'Entrar';
      errorSlot.innerHTML = `<div class="login-error">${icon('alert', 15)} Usuário ou senha incorretos.</div>`;
    }
  });
}

function funcionariosAtivos(ano, mes) {
  return state.funcionarios.filter((f) => {
    if (!f.admissao) return true;
    const parts = f.admissao.split('-').map(Number);
    const ay = parts[0], am = parts[1];
    const depoisAdmissao = ay < ano || (ay === ano && am <= mes);
    if (!depoisAdmissao) return false;
    if (f.demissao) {
      const dparts = f.demissao.split('-').map(Number);
      const dy = dparts[0], dm = dparts[1];
      const antesDemissao = ano < dy || (ano === dy && mes <= dm);
      return antesDemissao;
    }
    return true;
  });
}

function tenureDays(f) {
  if (!f.admissao) return 0;
  const start = new Date(f.admissao + 'T00:00:00');
  const end = f.demissao ? new Date(f.demissao + 'T00:00:00') : new Date();
  return Math.max(0, Math.floor((end - start) / (1000 * 60 * 60 * 24)));
}

function formatTenure(days) {
  const years = Math.floor(days / 365.25);
  const months = Math.floor((days - years * 365.25) / 30.44);
  if (years <= 0 && months <= 0) return `${days} dia${days === 1 ? '' : 's'}`;
  const parts = [];
  if (years > 0) parts.push(`${years} ano${years > 1 ? 's' : ''}`);
  if (months > 0) parts.push(`${months} ${months > 1 ? 'meses' : 'mês'}`);
  return parts.join(' e ');
}

function computeDadosMensais(ano) {
  return MONTHS_SHORT.map((label, idx) => {
    const mes = idx + 1;
    const ativos = funcionariosAtivos(ano, mes);
    let proventos = 0, descontos = 0, liquido = 0, inss = 0, irrf = 0, fgts = 0;
    ativos.forEach((f) => {
      const folha = computeFolha(f, ano, mes, state.lancamentos, state.config);
      proventos += folha.totalProventos;
      descontos += folha.totalDescontos;
      liquido += folha.salarioLiquido;
      inss += folha.inssValor;
      irrf += folha.irrfValor;
      fgts += folha.fgtsValor;
    });
    return {
      mes: label, mesNum: mes,
      proventos: round2(proventos), descontos: round2(descontos), liquido: round2(liquido),
      inss: round2(inss), irrf: round2(irrf), fgts: round2(fgts), headcount: ativos.length,
    };
  });
}

/* ---------------- FILTRO DE PERÍODO (dashboard) ---------------- */

function enumerateMonthsInRange(startDate, endDate) {
  const months = [];
  let y = startDate.getFullYear(), m = startDate.getMonth() + 1;
  const endY = endDate.getFullYear(), endM = endDate.getMonth() + 1;
  let guard = 0;
  while ((y < endY || (y === endY && m <= endM)) && guard < 600) {
    months.push({ ano: y, mes: m });
    m++; if (m > 12) { m = 1; y++; }
    guard++;
  }
  return months;
}

function periodoMeses() {
  const ui = state.ui;
  if (ui.periodoMode === 'mes') {
    return [{ ano: ui.periodoAno, mes: ui.periodoMes }];
  }
  if (ui.periodoMode === 'intervalo') {
    if (!ui.periodoInicio || !ui.periodoFim) return [];
    const start = new Date(ui.periodoInicio + 'T00:00:00');
    const end = new Date(ui.periodoFim + 'T00:00:00');
    if (isNaN(start) || isNaN(end) || start > end) return [];
    return enumerateMonthsInRange(start, end);
  }
  return MONTHS_SHORT.map((_, idx) => ({ ano: state.anoAtivo, mes: idx + 1 }));
}

function periodoLabel() {
  const ui = state.ui;
  if (ui.periodoMode === 'mes') return `${MONTHS_PT[ui.periodoMes - 1]}/${ui.periodoAno}`;
  if (ui.periodoMode === 'intervalo') return `${fmtDate(ui.periodoInicio)} a ${fmtDate(ui.periodoFim)}`;
  return String(state.anoAtivo);
}

function computeStatsForPeriodo() {
  const meses = periodoMeses();
  let totalLiquido = 0, totalEncargos = 0;
  meses.forEach(({ ano, mes }) => {
    funcionariosAtivos(ano, mes).forEach((f) => {
      const folha = computeFolha(f, ano, mes, state.lancamentos, state.config);
      totalLiquido += folha.salarioLiquido;
      totalEncargos += folha.inssValor + folha.irrfValor + folha.fgtsValor;
    });
  });
  const numMeses = meses.length || 1;
  return { totalLiquido: round2(totalLiquido), totalEncargos: round2(totalEncargos), media: round2(totalLiquido / numMeses), numMeses: meses.length };
}

function funcionariosDemitidosNoPeriodo() {
  const meses = periodoMeses();
  const chave = new Set(meses.map((m) => `${m.ano}-${m.mes}`));
  return state.funcionarios
    .filter((f) => {
      if (!f.demissao) return false;
      const [dy, dm] = f.demissao.split('-').map(Number);
      return chave.has(`${dy}-${dm}`);
    })
    .sort((a, b) => new Date(b.demissao) - new Date(a.demissao));
}

function computeHeadcountStatusSeries(ano) {
  return MONTHS_SHORT.map((label, idx) => {
    const mes = idx + 1;
    const ativos = funcionariosAtivos(ano, mes).length;
    const demitidosAcumulado = state.funcionarios.filter((f) => {
      if (!f.demissao) return false;
      const [dy, dm] = f.demissao.split('-').map(Number);
      return dy < ano || (dy === ano && dm <= mes);
    }).length;
    return { mes: label, ativos, demitidos: demitidosAcumulado };
  });
}

    state.ui.periodoMode = e.target.value;
    renderView();

  const mesSel = $('#dash-periodo-mes');
  if (mesSel) mesSel.addEventListener('change', (e) => { state.ui.periodoMes = Number(e.target.value); refreshDashboardIndicators(); });
  const anoInput = $('#dash-periodo-ano');

  const inicioInput = $('#dash-periodo-inicio');
  if (inicioInput) inicioInput.addEventListener('change', (e) => { state.ui.periodoInicio = e.target.value; refreshDashboardIndicators(); });
  const fimInput = $('#dash-periodo-fim');
  if (fimInput) fimInput.addEventListener('change', (e) => { state.ui.periodoFim = e.target.value; refreshDashboardIndicators(); });

  function refreshDashboardIndicators() {
    $('#dash-cards').innerHTML = dashboardCardsHTML(computeStatsForPeriodo());
    $('#dash-demitidos-wrap').innerHTML = tabelaDemitidosHTML();
  }
}

function attachFuncionariosListeners() {
  $('#btn-new-func').addEventListener('click', () => openFuncForm(null));

  const searchInput = $('#func-search');
  searchInput.addEventListener('input', (e) => {
    state.ui.funcSearch = e.target.value;
    const search = state.ui.funcSearch.toLowerCase();
    const filtered = state.funcionarios.filter((f) =>
      f.nome.toLowerCase().includes(search) || (f.cpf || '').includes(state.ui.funcSearch) || (f.codigo || '').includes(state.ui.funcSearch)
    );
    $('#func-tbody').innerHTML = funcionariosRowsHTML(filtered);
    $('#func-count').textContent = `${filtered.length} de ${state.funcionarios.length} funcionário(s)`;
    bindRowActions();
  });

  bindRowActions();

  function bindRowActions() {
    $all('[data-edit]').forEach((btn) => btn.addEventListener('click', () => {
      const f = state.funcionarios.find((x) => x.id === btn.dataset.edit);
      openFuncForm(f);
    }));
    $all('[data-delete]').forEach((btn) => btn.addEventListener('click', () => {
      const f = state.funcionarios.find((x) => x.id === btn.dataset.delete);
      openModal(confirmDeleteFuncHTML(f), () => {
        $('#confirm-delete-func').addEventListener('click', () => {
          state.funcionarios = state.funcionarios.filter((x) => x.id !== f.id);
          storageSet(STORAGE_KEYS.FUNC, state.funcionarios);
          cloudSyncDelete('funcionarios', f.id);
          closeModal();
          renderView();
        });
      });
    }));
  }
}

function openFuncForm(existing) {
  openModal(funcionarioFormHTML(existing), () => {
    $('#func-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const nome = $('#f-nome').value.trim();
      const salario = $('#f-salario').value;
      if (!nome || !salario) return;
      const data = {
        codigo: $('#f-codigo').value.trim(),
        nome, cpf: $('#f-cpf').value.trim(), pis: $('#f-pis').value.trim(),
        ctps: $('#f-ctps').value.trim(), serie: $('#f-serie').value.trim(),
        funcao: $('#f-funcao').value.trim(), cbo: $('#f-cbo').value.trim(),
        admissao: $('#f-admissao').value, demissao: $('#f-demissao').value,
        salarioBase: Number(salario), dependentes: Number($('#f-dependentes').value || 0),
      };
      let saved;
      if (existing) {
        saved = { ...existing, ...data };
        state.funcionarios = state.funcionarios.map((f) => f.id === existing.id ? saved : f);
      } else {
        saved = { ...data, id: uid() };
        state.funcionarios = [...state.funcionarios, saved];
      }
      storageSet(STORAGE_KEYS.FUNC, state.funcionarios);
      cloudSyncUpsert('funcionarios', funcToRow(saved));
      closeModal();
      renderView();
    });
  });
}

function lancamentoFormHTML() {
  return `

function lancChipsHTML(tipo) {
  const catalogo = tipo === 'provento' ? CODIGOS_PROVENTO : CODIGOS_DESCONTO;
  return catalogo.map((c) => `<button type="button" class="chip" data-codigo="${c.codigo}" data-desc="${escapeHtml(c.descricao)}">${escapeHtml(c.descricao)}</button>`).join('');
}

function attachLancamentosListeners() {
  $('#lanc-func').addEventListener('change', (e) => { state.ui.lancFuncionarioId = e.target.value; refreshLancContent(); });
  $('#lanc-mes').addEventListener('change', (e) => { state.ui.lancMes = Number(e.target.value); refreshLancContent(); });
  $('#lanc-ano').addEventListener('change', (e) => { state.ui.lancAno = Number(e.target.value) || state.ui.lancAno; refreshLancContent(); });
  const newBtn = $('#btn-new-lanc');
  if (newBtn) newBtn.addEventListener('click', openLancForm);
  bindRemoveButtons();

  function refreshLancContent() {
    $('#lanc-content').innerHTML = lancContentHTML();
    bindRemoveButtons();
  }
  function bindRemoveButtons() {
    $all('[data-remove-lanc]').forEach((btn) => btn.addEventListener('click', () => {
      state.lancamentos = state.lancamentos.filter((l) => l.id !== btn.dataset.removeLanc);
      storageSet(STORAGE_KEYS.LANC, state.lancamentos);
      cloudSyncDelete('lancamentos', btn.dataset.removeLanc);
      refreshLancContent();
    }));
  }
}

function openLancForm() {
  let tipo = 'provento';
  openModal(lancamentoFormHTML(), () => {
    $all('.lanc-tipo-btn').forEach((btn) => btn.addEventListener('click', () => {
      tipo = btn.dataset.tipo;
      $all('.lanc-tipo-btn').forEach((b) => b.classList.toggle('active', b === btn));
      $('#lanc-chip-row').innerHTML = lancChipsHTML(tipo);
      $('#l-codigo').value = ''; $('#l-descricao').value = '';
      bindChips();
      $('#lanc-submit-btn').className = 'btn ' + (tipo === 'provento' ? 'btn-moss' : 'btn-brick');
      $('#lanc-submit-btn').innerHTML = `${icon('plus', 16)} Adicionar ${tipo === 'provento' ? 'provento' : 'desconto'}`;
    }));
    bindChips();
    function bindChips() {
      $all('.chip').forEach((chip) => chip.addEventListener('click', () => {
        $('#l-codigo').value = chip.dataset.codigo;
        $('#l-descricao').value = chip.dataset.desc;
        $all('.chip').forEach((c) => c.classList.toggle('chip-active', c === chip));
      }));
    }
    $('#lanc-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const descricao = $('#l-descricao').value.trim();
      const valor = $('#l-valor').value;
      if (!descricao || !valor) return;
      const novoLanc = {
        id: uid(), funcionarioId: state.ui.lancFuncionarioId, ano: state.ui.lancAno, mes: state.ui.lancMes,
        tipo, codigo: $('#l-codigo').value.trim() || '—', descricao, referencia: $('#l-referencia').value.trim(), valor: Number(valor),
      };
      state.lancamentos = [...state.lancamentos, novoLanc];
      storageSet(STORAGE_KEYS.LANC, state.lancamentos);
      cloudSyncUpsert('lancamentos', lancToRow(novoLanc));
      closeModal();
      renderView();
    });
  });
}

function payslipHTML(folha) {
  const { funcionario, ano, mes, proventos, descontosLanc, totalProventos, baseINSS, inssValor, baseFGTS, fgtsValor, baseIRRF, irrfValor, totalDescontos, salarioLiquido } = folha;

    ...(inssValor > 0 ? [{ codigo: '91005', descricao: 'INSS' , valor: inssValor }] : []),
    ...(irrfValor > 0 ? [{ codigo: '91006', descricao: 'IRRF', valor: irrfValor }] : []),
    ...descontosLanc,
  ];
  return `
    <div class="payslip" id="payslip-print-area">
      <div class="payslip-header">
        <img src="data:image/png;base64,${LOGO_B64}" alt="" class="payslip-logo" />
        <div><strong>${escapeHtml(state.empresa.nome)}</strong><div class="payslip-meta">CNPJ ${escapeHtml(state.empresa.cnpj)} · ${escapeHtml(state.empresa.endereco)}</div></div>
        <div class="payslip-competencia"><span>Recibo de Pagamento de Salário</span><strong>${MONTHS_PT[mes - 1]} / ${ano}</strong></div>
      </div>
      <div class="payslip-funcionario">
        <div><span>Código</span><strong>${escapeHtml(funcionario.codigo || '—')}</strong></div>
        <div class="grow"><span>Nome</span><strong>${escapeHtml(funcionario.nome)}</strong></div>
        <div><span>Função</span><strong>${escapeHtml(funcionario.funcao || '—')}</strong></div>
        <div><span>CBO</span><strong>${escapeHtml(funcionario.cbo || '—')}</strong></div>
      </div>
      <div class="payslip-funcionario">
        <div><span>CPF</span><strong>${escapeHtml(funcionario.cpf || '—')}</strong></div>
        <div><span>PIS</span><strong>${escapeHtml(funcionario.pis || '—')}</strong></div>
        <div><span>CTPS/Série</span><strong>${escapeHtml(funcionario.ctps || '—')}${funcionario.serie ? '/' + escapeHtml(funcionario.serie) : ''}</strong></div>
        <div><span>Admissão</span><strong>${fmtDate(funcionario.admissao)}</strong></div>
      </div>
      <table class="payslip-table">
        <thead><tr><th>Cód.</th><th>Descrição</th><th>Referência</th><th>Proventos</th><th>Descontos</th></tr></thead>
        <tbody>
          ${proventos.map((p) => `<tr><td class="mono">${escapeHtml(p.codigo)}</td><td>${escapeHtml(p.descricao)}</td><td class="mono">${escapeHtml(p.referencia || '—')}</td><td class="mono num-positive">${fmtBRL(p.valor)}</td><td></td></tr>`).join('')}
          ${linhasDesconto.map((d) => `<tr><td class="mono">${escapeHtml(d.codigo)}</td><td>${escapeHtml(d.descricao)}</td><td class="mono">${escapeHtml(d.referencia || '—')}</td><td></td><td class="mono num-negative">${fmtBRL(d.valor)}</td></tr>`).join('')}
        </tbody>
      </table>
      <div class="payslip-bases">
        <div><span>Base INSS</span><strong>${fmtBRL(baseINSS)}</strong></div>
        <div><span>Base FGTS</span><strong>${fmtBRL(baseFGTS)}</strong></div>
        <div><span>Valor FGTS (info.)</span><strong>${fmtBRL(fgtsValor)}</strong></div>
        <div><span>Base IRRF</span><strong>${fmtBRL(baseIRRF)}</strong></div>
      </div>
      <div class="payslip-totals">
        <div><span>Total de proventos</span><strong class="num-positive">${fmtBRL(totalProventos)}</strong></div>
        <div><span>Total de descontos</span><strong class="num-negative">${fmtBRL(totalDescontos)}</strong></div>
        <div class="payslip-liquido"><span>Salário líquido</span><strong>${fmtBRL(salarioLiquido)}</strong></div>
      </div>
      <div class="payslip-signature">
        <p>Declaro ter recebido o valor líquido deste recibo.</p>
        <div class="signature-line">Assinatura do Colaborador</div>
      </div>
    </div>
  `;
}

function attachFolhaListeners() {
  $('#folha-func').addEventListener('change', (e) => { state.ui.folhaFuncionarioId = e.target.value; refreshFolha(); });
  $('#folha-mes').addEventListener('change', (e) => { state.ui.folhaMes = Number(e.target.value); refreshFolha(); });

  function refreshFolha() { $('#folha-content').innerHTML = folhaContentHTML(); }

        <p class="empty-hint" style="margin-bottom:14px">Sincroniza funcionários, lançamentos e configurações com um projeto Supabase — útil para acessar os dados de mais de um computador.</p>
        <div class="form-grid">
          <div class="form-field span-2"><label>URL do projeto</label><input id="sb-url" value="${escapeHtml(state.supabase.url)}" placeholder="https://xxxx.supabase.co" /></div>
          <div class="form-field span-2">
            <label>Chave anon (public)</label>
            <div class="input-with-icon">
              <input id="sb-key" type="password" value="${escapeHtml(state.supabase.anonKey)}" placeholder="eyJhbGciOi..." />
              <button type="button" class="icon-toggle" id="sb-toggle-key" aria-label="Mostrar chave">${icon('eye', 17)}</button>
            </div>
          </div>
        </div>
        <label class="remember-row" style="margin-top:14px">
          <input type="checkbox" id="sb-enabled" ${state.supabase.enabled ? 'checked' : ''} />
          <span>Sincronizar automaticamente com o Supabase (além do armazenamento local)</span>
        </label>
        <div class="sb-actions">
          <button type="button" class="btn btn-ghost" id="sb-ping">${icon('activity', 15)} Testar conexão</button>
          <button type="button" class="btn btn-ghost" id="sb-push">${icon('cloud', 15)} Enviar dados locais para a nuvem</button>
          <button type="button" class="btn btn-ghost" id="sb-pull">${icon('cloud', 15)} Importar dados da nuvem</button>
        </div>
        <div id="sb-ping-result"></div>
        <details class="sb-sql-details">
          <summary>Ver script SQL para criar as tabelas no Supabase</summary>
          <pre class="sb-sql-block">${escapeHtml(SUPABASE_SQL_SCRIPT)}</pre>
        </details>
        <div class="login-error" style="margin-top:14px;background:${COLORS.goldLight};color:#7a5c1a">
          ${icon('alert', 15)} A chave "anon" é feita para ser pública, mas isso só é seguro se as políticas de RLS forem restritivas. Como ela fica embutida neste arquivo HTML, qualquer pessoa que abrir o arquivo terá o mesmo acesso às tabelas liberadas. Para dados reais de CPF e salário, considere restringir ainda mais com Supabase Auth.
        </div>
      </div>

      <div class="panel danger-zone">
        <h3>${icon('trash', 16)} Zona de risco</h3>
        <p class="empty-hint" style="margin-bottom:14px">Zera os valores exibidos no Dashboard removendo todos os funcionários e lançamentos cadastrados — local e, se a sincronização estiver ativa, também na nuvem. Esta ação não pode ser desfeita.</p>
        <button type="button" class="btn btn-danger" id="btn-clear-data">${icon('trash', 16)} Zerar todos os dados</button>
      </div>
    </div>
  `;
}

function confirmClearDataHTML() {
  return `
    <div class="modal-header"><h3>Zerar todos os dados</h3><button class="icon-btn modal-close-btn">${icon('x', 18)}</button></div>
    <div class="modal-body">
      <p>Isso vai apagar <strong>todos os funcionários e lançamentos</strong> (${state.funcionarios.length} funcionário(s), ${state.lancamentos.length} lançamento(s)) e zerar os valores do Dashboard.${state.supabase.enabled ? ' As tabelas no Supabase também serão limpas.' : ''}</p>
      <p style="margin-top:8px"><strong>Esta ação não pode ser desfeita.</strong></p>
      <div class="form-actions" style="margin-top:20px">
        <button class="btn btn-ghost modal-close-btn">Cancelar</button>
        <button class="btn btn-danger" id="confirm-clear-data">${icon('trash', 16)} Sim, zerar tudo</button>
      </div>
    </div>
  `;
}

function attachConfigListeners() {
  $('#btn-clear-data').addEventListener('click', () => {
    openModal(confirmClearDataHTML(), () => {
      $('#confirm-clear-data').addEventListener('click', async () => {
        const btn = $('#confirm-clear-data');
        btn.disabled = true; btn.textContent = 'Zerando...';
        state.funcionarios = [];
        state.lancamentos = [];
        await storageSet(STORAGE_KEYS.FUNC, state.funcionarios);
        await storageSet(STORAGE_KEYS.LANC, state.lancamentos);
        if (state.supabase.enabled) {
          try {
            await fetch(supabaseBaseUrl(state.supabase) + '/rest/v1/funcionarios?id=not.is.null', { method: 'DELETE', headers: supabaseHeaders(state.supabase, { 'Prefer': 'return=minimal' }) });
            await fetch(supabaseBaseUrl(state.supabase) + '/rest/v1/lancamentos?id=not.is.null', { method: 'DELETE', headers: supabaseHeaders(state.supabase, { 'Prefer': 'return=minimal' }) });
          } catch (e) {
            console.warn('Falha ao limpar dados na nuvem:', e.message);
          }
        }
        closeModal();
        renderView();
      });
    });
  });
  const keyInput = $('#sb-key');
  const toggleKeyBtn = $('#sb-toggle-key');
  let showKey = false;
  toggleKeyBtn.addEventListener('click', () => {
    showKey = !showKey;
    keyInput.type = showKey ? 'text' : 'password';
    toggleKeyBtn.innerHTML = showKey ? icon('eyeOff', 17) : icon('eye', 17);
  });

  function currentSupabaseFormConfig() {
    return { url: $('#sb-url').value.trim(), anonKey: $('#sb-key').value.trim(), enabled: $('#sb-enabled').checked };
  }
  function showPingResult(result) {
    state.ui.pingResult = result;
    const el = $('#sb-ping-result');
    if (!el) return;
    el.innerHTML = `<div class="ping-result ${result.ok ? 'ping-ok' : 'ping-fail'}">
      <span class="ping-dot"></span> ${escapeHtml(result.message)} ${result.ms ? `· ${result.ms}ms` : ''}
    </div>`;
  }

  $('#sb-ping').addEventListener('click', async () => {
    const cfg = currentSupabaseFormConfig();
    $('#sb-ping-result').innerHTML = `<div class="ping-result ping-pending"><span class="ping-dot"></span> Testando conexão...</div>`;
    const result = await supabasePing(cfg);
    showPingResult(result);
  });

  $('#sb-push').addEventListener('click', async () => {
    const cfg = currentSupabaseFormConfig();
    const btn = $('#sb-push');
    const original = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = 'Enviando...';
    try {
      if (state.funcionarios.length) await supabaseUpsert(cfg, 'funcionarios', state.funcionarios.map(funcToRow));
      if (state.lancamentos.length) await supabaseUpsert(cfg, 'lancamentos', state.lancamentos.map(lancToRow));
      await supabaseUpsert(cfg, 'app_settings', [{ id: 1, config: state.config, empresa: state.empresa }]);
      showPingResult({ ok: true, ms: 0, message: 'Dados locais enviados com sucesso.' });
    } catch (e) {
      showPingResult({ ok: false, ms: 0, message: 'Falha ao enviar: ' + e.message });
    }
    btn.disabled = false; btn.innerHTML = original;
  });

  $('#sb-pull').addEventListener('click', async () => {
    const cfg = currentSupabaseFormConfig();
    const btn = $('#sb-pull');
    const original = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = 'Importando...';
    try {
      const prevCfg = state.supabase;
      state.supabase = cfg;
      await pullFromCloud();
      storageSet(STORAGE_KEYS.FUNC, state.funcionarios);
      storageSet(STORAGE_KEYS.LANC, state.lancamentos);
      storageSet(STORAGE_KEYS.CONFIG, state.config);
      storageSet(STORAGE_KEYS.EMPRESA, state.empresa);
      showPingResult({ ok: true, ms: 0, message: 'Dados importados da nuvem com sucesso.' });
    } catch (e) {
      showPingResult({ ok: false, ms: 0, message: 'Falha ao importar: ' + e.message });
    }
    btn.disabled = false; btn.innerHTML = original;
  });

  $('#btn-save-config').addEventListener('click', () => {
    const inss = $all('[data-inss-ate]').map((input, idx) => ({
      ate: Number(input.value),
      aliquota: Number($(`[data-inss-aliq="${idx}"]`).value),
    }));
    const irrf = $all('[data-irrf-ate]').map((input, idx) => ({
      ate: input.value === '' ? 99999999 : Number(input.value),
      aliquota: Number($(`[data-irrf-aliq="${idx}"]`).value),
      deducao: Number($(`[data-irrf-deducao="${idx}"]`).value),
    }));
    state.config = {
      inss, irrf,
      deducaoPorDependente: Number($('#cfg-dependente').value || 0),
      fgtsRate: Number($('#cfg-fgts').value || 0),
    };
    state.empresa = {
      nome: $('#cfg-nome').value.trim(),
      marca: $('#cfg-marca').value.trim(),
      cnpj: $('#cfg-cnpj').value.trim(),
      endereco: $('#cfg-endereco').value.trim(),
    };
    state.supabase = currentSupabaseFormConfig();
    storageSet(STORAGE_KEYS.CONFIG, state.config);
    storageSet(STORAGE_KEYS.EMPRESA, state.empresa);
    storageSet(STORAGE_KEYS.SUPABASE, state.supabase);
    if (state.supabase.enabled) {
      cloudSyncUpsert('app_settings', { id: 1, config: state.config, empresa: state.empresa });
    }
    const label = $('#save-config-label');
    label.textContent = 'Salvo!';
    setTimeout(() => { if (label) label.textContent = 'Salvar alterações'; }, 2000);
    renderApp(); // sidebar/logo brand text may have changed
  });
}

/* ---------------- START ---------------- */

init();

</script>
</body>
</html>
